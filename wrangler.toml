name = "er45"
compatibility_date = "2026-06-01"
main = "worker.js"

# One Worker serves both sites, routed by hostname (see worker.js):
#   archiv.er45.com         -> the /archive/ subtree (the archive)
#   er45.com / www.er45.com -> the memorial (repo root, index.html)
# run_worker_first lets the script rewrite the archive subdomain before assets
# are matched; binding exposes the static files as env.ASSETS.
[assets]
directory = "./"
binding = "ASSETS"
run_worker_first = true
