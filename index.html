<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>ER45</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<meta name="description" content="A memorial for ER45.com. The lights went out, but the bass remains. The infrastructure continues in the subdomains." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box}
  /* fixed background colour, matching the artwork's top (sky) edge */
  html,body{margin:0;height:100%;background:#233044;color:#e9eefb;font-family:"Courier New",ui-monospace,monospace;overflow:hidden}

  .stage{position:fixed;inset:0;display:grid;place-items:end center}
  /* the scene keeps the artwork's aspect ratio and fits the viewport, bottom-aligned */
  .scene{position:relative;aspect-ratio:1024/559;width:min(100vw, calc(100vh * 1024 / 559));
    max-height:100vh;image-rendering:pixelated}
  .scene img{width:100%;height:100%;display:block;image-rendering:pixelated;user-select:none;-webkit-user-drag:none}

  /* invisible click target over the drawn "Pay Respects" button — no hover visual */
  .hot{position:absolute;display:block;cursor:pointer}
  .hot.respects{left:38%;top:79%;width:24%;height:12.5%}

  /* top-right pixel links */
  .corner{position:fixed;top:14px;right:14px;z-index:10;display:flex;gap:10px}
  .plink{font-family:'Press Start 2P',ui-monospace,monospace;font-size:10px;line-height:1;letter-spacing:.04em;
    color:var(--c,#e9eef0);text-decoration:none;border:2px solid currentColor;border-bottom-width:4px;
    background:rgba(8,12,20,.55);padding:.85em .95em;border-radius:4px;
    text-shadow:0 0 8px currentColor;box-shadow:0 0 0 2px rgba(0,0,0,.25);
    transition:transform .1s, filter .15s}
  .plink:hover{filter:brightness(1.25)}
  .plink:active{transform:translateY(2px);border-bottom-width:2px}
  .plink.archive{--c:#38c6f5}
  .plink.dynamic{--c:#f46cf4}

  /* screen-reader / keyboard fallback */
  .sr{position:absolute;left:-9999px}
  @media (max-width:480px){ .plink{font-size:8px;padding:.8em} .corner{gap:8px;top:10px;right:10px} }
</style>
</head>
<body>
  <main class="stage">
    <div class="scene">
      <img src="assets/memorial.png"
           alt="R.I.P. ER45.COM — a pixel-art tombstone with a dead tree and a lit candle. 'The lights went out, but the bass remains.' End of an Era. The infrastructure continues in the subdomains." />
      <!-- the drawn "Pay Respects" button enters the archive (no hover visual) -->
      <a class="hot respects" data-archive href="/archive/" aria-label="Pay respects — enter the ER45 archive" title="Pay respects — enter the archive"></a>
    </div>
  </main>

  <!-- two pixel links, top-right -->
  <nav class="corner">
    <a class="plink archive" data-archive href="/archive/" title="The party chronology, articles &amp; flyers">ARCHIVE</a>
    <a class="plink dynamic" href="/dynamic.html" title="ER45 — the needle still remembers">DYNAMIC</a>
  </nav>

  <a class="sr" data-archive href="/archive/">Enter the ER45 archive</a>

<script>
/* No audio. Route every archive link to the archiv.er45.com subdomain in
   production; keep the /archive/ path locally so the static server still works.
   (The DYNAMIC link is a plain /dynamic.html path — works in both.) */
(() => {
  const h = location.hostname;
  const isLocal = h==='' || h==='localhost' || h==='127.0.0.1' ||
    /^(10\.|192\.168\.|172\.(1[6-9]|2\d|3[01])\.)/.test(h);
  const href = isLocal ? '/archive/' : (location.protocol + '//archiv.' + h.replace(/^www\./,'') + '/');
  document.querySelectorAll('[data-archive]').forEach(a => a.setAttribute('href', href));
})();
</script>
</body>
</html>
