<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>ER45</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<meta name="description" content="A memorial for ER45.com. The lights went out, but the bass remains. The infrastructure continues in the subdomains." />
<style>
  :root{ --green:#7bf06a; --cyan:#36d6ff; --font:"Courier New", ui-monospace, monospace; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#233044;color:#e9eefb;font-family:var(--font);overflow:hidden}
  /* page bg matches the artwork's top edge (#233044) and bottom edge (#364751),
     so the letterbox above/below the image blends in and the image seems endless.
     The 47-53% blend band sits behind the centred image, so it's never visible. */
  body{background:linear-gradient(to bottom, #233044 0%, #233044 47%, #364751 53%, #364751 100%)}

  .stage{position:fixed;inset:0;display:grid;place-items:end center}
  /* the scene keeps the artwork's aspect ratio and fits the viewport */
  .scene{position:relative;aspect-ratio:1024/559;width:min(100vw, calc(100vh * 1024 / 559));
    max-height:100vh;image-rendering:pixelated}
  .scene img{width:100%;height:100%;display:block;image-rendering:pixelated;user-select:none;-webkit-user-drag:none}

  /* clickable hotspots over the artwork's "Pay Respects" button + subdomains line */
  .hot{position:absolute;display:block;border-radius:8px;cursor:pointer;
    outline:2px solid transparent;transition:outline-color .15s, box-shadow .15s, background .15s}
  .hot:hover,.hot:focus-visible{outline-color:rgba(123,240,106,.65);
    background:rgba(123,240,106,.08);box-shadow:0 0 22px rgba(123,240,106,.30)}
  /* the archive link sits right over the drawn "Pay Respects" button */
  .hot.respects{left:38%;top:79%;width:24%;height:12.5%}
  .hot.subs{left:22%;top:91.5%;width:56%;height:7%}

  /* screen-reader / keyboard fallback */
  .sr{position:absolute;left:-9999px}
</style>
</head>
<body>
  <main class="stage">
    <div class="scene">
      <img src="assets/memorial.png"
           alt="R.I.P. ER45.COM — a pixel-art tombstone with a dead tree and a lit candle. 'The lights went out, but the bass remains.' End of an Era. The infrastructure continues in the subdomains." />
      <!-- both the drawn 'Pay Respects' button and the 'subdomains' line lead to the archive -->
      <a class="hot respects" data-archive href="/archive/" aria-label="Enter the ER45 archive" title="Enter the ER45 archive"></a>
      <a class="hot subs" data-archive href="/archive/" aria-label="The infrastructure continues in the subdomains — open the archive" title="The infrastructure continues in the subdomains"></a>
    </div>
  </main>

  <a class="sr" data-archive href="/archive/">Enter the ER45 archive</a>

<script>
/* No audio. Route the archive link to the archiv.er45.com subdomain in
   production; keep the /archive/ path locally so the static server still works. */
(() => {
  const h = location.hostname;
  const isLocal = h==='' || h==='localhost' || h==='127.0.0.1' ||
    /^(10\.|192\.168\.|172\.(1[6-9]|2\d|3[01])\.)/.test(h);
  const href = isLocal ? '/archive/' : (location.protocol + '//archiv.' + h.replace(/^www\./,'') + '/');
  document.querySelectorAll('[data-archive]').forEach(a => a.setAttribute('href', href));
})();

/* Edge-blend: sample the artwork's top + bottom edge colours and paint the page
   background to match, so the letterbox blends in. Auto-adapts if the image is
   swapped (same-origin, so the canvas isn't tainted). CSS gradient is the fallback. */
(() => {
  const img = document.querySelector('.scene img'); if(!img) return;
  const sample = () => {
    try{
      const w = img.naturalWidth, h = img.naturalHeight; if(!w || !h) return;
      const cv = document.createElement('canvas'); cv.width = w; cv.height = h;
      const ctx = cv.getContext('2d', { willReadFrequently:true });
      ctx.drawImage(img, 0, 0);
      const band = (y0, y1) => {
        let r=0,g=0,b=0,n=0;
        for(let y=y0; y<y1; y++){
          const d = ctx.getImageData(0, y, w, 1).data;
          for(let i=0; i<d.length; i+=4){ if(d[i+3]>10){ r+=d[i]; g+=d[i+1]; b+=d[i+2]; n++; } }
        }
        n = n || 1; return `rgb(${Math.round(r/n)},${Math.round(g/n)},${Math.round(b/n)})`;
      };
      const k = Math.max(1, Math.round(h*0.01));           // ~1% band, min 1px
      const top = band(0, k), bot = band(h-k, h);
      document.body.style.background =
        `linear-gradient(to bottom, ${top} 0%, ${top} 47%, ${bot} 53%, ${bot} 100%)`;
    }catch(e){ /* keep the CSS fallback */ }
  };
  img.complete ? sample() : img.addEventListener('load', sample, { once:true });
})();
</script>
</body>
</html>
