<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>ER45</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<meta name="description" content="A memorial for ER45.com. The lights went out, but the bass remains. The infrastructure continues in the subdomains." />
<style>
  :root{ --green:#7bf06a; --cyan:#36d6ff; --font:"Courier New", ui-monospace, monospace; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#1b2730;color:#e9eefb;font-family:var(--font);overflow:hidden}
  /* page background blends with the artwork's dark edges */
  body{background:radial-gradient(120% 120% at 50% 42%, #2b3b45 0%, #1b2730 60%, #121b22 100%)}

  .stage{position:fixed;inset:0;display:grid;place-items:center}
  /* the scene keeps the artwork's aspect ratio and fits the viewport */
  .scene{position:relative;aspect-ratio:1024/559;width:min(100vw, calc(100vh * 1024 / 559));
    max-height:100vh;image-rendering:pixelated}
  .scene img{width:100%;height:100%;display:block;image-rendering:pixelated;user-select:none;-webkit-user-drag:none}

  /* clickable hotspots over the artwork's "Pay Respects" button + subdomains line */
  .hot{position:absolute;display:block;border-radius:8px;cursor:pointer;
    outline:2px solid transparent;transition:outline-color .15s, box-shadow .15s, background .15s}
  .hot:hover,.hot:focus-visible{outline-color:rgba(123,240,106,.65);
    background:rgba(123,240,106,.08);box-shadow:0 0 22px rgba(123,240,106,.30)}
  .hot.respects{left:35%;top:81%;width:30%;height:10%}
  .hot.subs{left:22%;top:91.5%;width:56%;height:7%}

  /* always-visible, unambiguous archive link */
  .enter{position:fixed;right:max(14px,env(safe-area-inset-right));bottom:max(14px,env(safe-area-inset-bottom));
    z-index:5;display:inline-flex;align-items:center;gap:.5em;text-decoration:none;color:var(--cyan);
    border:1px solid rgba(54,214,255,.4);background:rgba(8,14,22,.6);backdrop-filter:blur(4px);
    padding:.55em 1em;border-radius:999px;font-size:clamp(11px,2.4vw,13px);letter-spacing:.1em;
    box-shadow:0 0 0 1px rgba(0,0,0,.3);transition:.2s}
  .enter:hover{color:#bfefff;border-color:var(--cyan);background:rgba(54,214,255,.14);
    box-shadow:0 0 18px rgba(54,214,255,.4);transform:translateY(-1px)}
  .enter b{color:var(--green);font-weight:bold}

  /* screen-reader / keyboard fallback */
  .sr{position:absolute;left:-9999px}
</style>
</head>
<body>
  <main class="stage">
    <div class="scene">
      <img src="assets/memorial.png"
           alt="R.I.P. ER45.COM — a pixel-art tombstone with a dead tree and a lit candle. 'The lights went out, but the bass remains.' End of an Era. The infrastructure continues in the subdomains." />
      <!-- both the drawn 'Pay Respects' button and the 'subdomains' line lead to the archive -->
      <a class="hot respects" data-archive href="/archive/" aria-label="Enter the ER45 archive" title="Enter the ER45 archive"></a>
      <a class="hot subs" data-archive href="/archive/" aria-label="The infrastructure continues in the subdomains — open the archive" title="The infrastructure continues in the subdomains"></a>
    </div>
  </main>

  <a class="enter" data-archive href="/archive/" title="The full party chronology, articles & flyers — 1991–2003">
    <b>archiv.er45.com</b> <span aria-hidden="true">↗</span>
  </a>

  <a class="sr" data-archive href="/archive/">Enter the ER45 archive</a>

<script>
/* No audio, no canvas — just the artwork + the archive link.
   Route the archive link to the archiv.er45.com subdomain in production;
   keep the /archive/ path locally so the static server still works. */
(() => {
  const h = location.hostname;
  const isLocal = h==='' || h==='localhost' || h==='127.0.0.1' ||
    /^(10\.|192\.168\.|172\.(1[6-9]|2\d|3[01])\.)/.test(h);
  const href = isLocal ? '/archive/' : (location.protocol + '//archiv.' + h.replace(/^www\./,'') + '/');
  document.querySelectorAll('[data-archive]').forEach(a => a.setAttribute('href', href));
})();
</script>
</body>
</html>
